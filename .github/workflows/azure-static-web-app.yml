# Azure Static Web Apps — deploy marketing site from site/
# Add repo secret: AZURE_STATIC_WEB_APPS_API_TOKEN (from Azure portal → SWA → Manage deployment token)

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_and_deploy:
    # Include workflow_dispatch so "Run workflow" in GitHub Actions is not skipped.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: site
          api_location: site/api
          output_location: ""
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
