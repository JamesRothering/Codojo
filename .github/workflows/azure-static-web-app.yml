# Azure Static Web Apps — deploy marketing site from site/
# Repo secret name must match Azure/GitHub integration (see Settings → Secrets → Actions).

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_and_deploy:
    # Include workflow_dispatch so "Run workflow" in GitHub Actions is not skipped.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      # Fork PRs (and some org policies) do not receive repository secrets — token is empty → Azure says "deployment_token was not provided".
      - name: Verify deployment token is available
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_BUSH_05288E01E }}
        run: |
          if [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ]; then
            echo "::error::Deployment token secret is missing or not available to this run."
            echo "Fix: add the secret under Repo Settings → Secrets and variables → Actions (exact name: AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_BUSH_05288E01E)."
            echo "If this job ran for a pull_request from a fork, GitHub never injects that secret — push the branch to this repo, merge, or use workflow_dispatch on the default branch."
            exit 1
          fi

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_BUSH_05288E01E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: site
          api_location: site/api
          output_location: ""
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_BUSH_05288E01E }}
          action: close
